<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Daily Set — Working Auth Version</title>

  <!-- Supabase v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- external JS file (fixed closing tag) -->
  <script defer src="script.js"></script>

  <style>
    :root{
      --bg:#0b1220; --card:#0f1724; --accent:#60a5fa; --muted:#9aa4b2;
      --success:#34d399; --danger:#ff6b6b; --glass: rgba(255,255,255,0.04);
    }
    :root[data-theme="light"]{
      --bg:#eaf3ff; --card:#ffffff; --accent:#3b82f6; --muted:#667;
      --success:#22c55e; --danger:#ef4444; --glass: rgba(2,12,30,0.04);
    }
    html,body{height:100%;margin:0}
    body{
      font-family:Inter,Arial,sans-serif;
      background:linear-gradient(180deg,var(--bg), #071028 20%);
      color:var(--muted);
      display:flex;gap:18px;padding:20px;
      min-height:100vh;box-sizing:border-box;
    }

    .card{background:var(--card);padding:16px;border-radius:12px;
      box-shadow:0 12px 40px rgba(2,12,30,0.4)}

    .small{max-width:320px}

    input,select{
      width:100%;padding:10px;border-radius:8px;
      border:1px solid var(--glass);margin-top:8px;
      background:transparent;color:inherit;
    }
    button{
      background:var(--accent);color:white;border:0;
      padding:8px 12px;border-radius:8px;cursor:pointer;
      font-weight:600;margin:6px 4px;
    }

    /* leaderboard */
    #leaderboardList{list-style:none;padding-left:14px;margin:0}
    .lb-item{opacity:0;transform:translateX(-8px);
      transition:opacity .35s ease,transform .35s ease}
    .lb-item.visible{opacity:1;transform:none}

    #darkToggle{
      background:transparent;border:1px solid var(--glass);
      padding:6px 10px;border-radius:8px;cursor:pointer;color:inherit;
    }
    .fade-in{animation:fadeIn .28s ease both}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  </style>
</head>

<body>

  <!-- AUTH -->
  <div id="authCard" class="card small fade-in">
    <h2>Daily Set</h2>
    <input id="email" type="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>

    <div style="display:flex;gap:8px;margin-top:8px">
      <button id="btnSignIn">Sign in</button>
      <button id="btnSignUp" style="background:#10b981">Create</button>
      <button id="btnSignOut" style="display:none;background:#8899b2">Sign out</button>
    </div>

    <p id="authMsg" style="height:18px;margin-top:6px"></p>

    <div id="presetAvatars" style="display:flex;gap:8px;margin-top:12px"></div>
    <input id="uploadAvatar" type="file" accept="image/*" style="margin-top:8px"/>
  </div>

  <!-- GAME PANEL -->
  <div id="gameCard" class="card fade-in" style="display:none;min-width:420px">
    <div class="topRow">
      <h3>Hello, <span id="playerEmail"></span></h3>
      <button id="darkToggle">Toggle Theme</button>
    </div>

    <h3>Leaderboard</h3>
    <ul id="leaderboardList"></ul>
  </div>

</body>
</html>
